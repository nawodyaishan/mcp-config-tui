version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:20"
      timezone: Asia/Colombo
    groups:
      go-minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:40"
      timezone: Asia/Colombo
    groups:
      actions-minor-and-patch:
        update-types:
          - minor
          - patch
