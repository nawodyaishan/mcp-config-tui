version: 2

project_name: exa-mcp-manager

before:
  hooks:
    - go mod tidy

builds:
  - id: exa-mcp-manager
    main: ./cmd/exa-mcp-manager
    binary: exa-mcp-manager
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - >-
        -s -w
        -X github.com/nawodyaishan/mcp-config-tui/pkg/version.Version={{ .Version }}
        -X github.com/nawodyaishan/mcp-config-tui/pkg/version.Commit={{ .ShortCommit }}
        -X github.com/nawodyaishan/mcp-config-tui/pkg/version.Date={{ .Date }}
        -X github.com/nawodyaishan/mcp-config-tui/pkg/version.GoVersion={{ .Env.GOVERSION }}

archives:
  - id: default
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

# Homebrew Tap Formula
brews:
  - repository:
      owner: nawodyaishan
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/nawodyaishan/mcp-config-tui"
    description: "macOS-first developer utility for wiring Exa MCP into local AI tools"
    license: "MIT"
    test: |
      system "#{bin}/exa-mcp-manager", "--help"
    install: |
      bin.install "exa-mcp-manager"

# nFPM for deb/rpm packages (bonus)
nfpms:
  - id: packages
    package_name: exa-mcp-manager
    vendor: nawodyaishan
    homepage: https://github.com/nawodyaishan/mcp-config-tui
    description: "macOS-first developer utility for wiring Exa MCP into local AI tools"
    license: MIT
    formats:
      - deb
      - rpm
